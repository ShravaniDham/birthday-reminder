# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/birthday_db_final
spring.datasource.username=root
spring.datasource.password=Shrav2005
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration (without explicit dialect - let Hibernate auto-detect)
