services:
  db:
    image: mysql:8.0
    container_name: birthday-reminder-db
    environment:
      MYSQL_DATABASE: birthday_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
